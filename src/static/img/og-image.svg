<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0b1223"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="35%" r="45%">
      <stop offset="0" stop-color="rgba(167,139,250,0.22)"/>
      <stop offset="1" stop-color="rgba(167,139,250,0)"/>
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="32%" r="45%">
      <stop offset="0" stop-color="rgba(96,165,250,0.22)"/>
      <stop offset="1" stop-color="rgba(96,165,250,0)"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <g transform="translate(92 138)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1016" height="354" rx="28" fill="rgba(30,41,59,0.55)" stroke="rgba(255,255,255,0.10)"/>
  </g>

  <g transform="translate(140 210)">
    <g transform="translate(0 0)">
      <rect x="62" y="-38" width="210" height="160" rx="44" fill="none" stroke="rgba(241,245,249,0.26)" stroke-width="10"/>
      <rect x="34" y="22" width="210" height="160" rx="44" fill="none" stroke="rgba(96,165,250,0.62)" stroke-width="10"/>
      <rect x="6" y="82" width="210" height="160" rx="44" fill="none" stroke="url(#accent)" stroke-width="13"/>
    </g>

    <g transform="translate(340 10)">
      <text x="0" y="86" fill="#f1f5f9" font-family="Poppins, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="74" font-weight="800" letter-spacing="-0.6">
        Sornex Studio
      </text>
      <text x="0" y="138" fill="rgba(226,232,240,0.85)" font-family="Poppins, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="28" font-weight="500">
        Web Agency • AI Solutions
      </text>
      <rect x="0" y="172" width="520" height="3" fill="rgba(255,255,255,0.10)"/>
      <text x="0" y="218" fill="rgba(226,232,240,0.78)" font-family="Poppins, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="22" font-weight="400">
        Design, performance e automazioni per acquisire clienti.
      </text>
